<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App 5-Day Forecast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="weatherAnimation" class="weather-animation">
        <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
        <div class="cloud c4"></div><div class="cloud c5"></div><div class="cloud c6"></div>
    </div>

    <div class="container">
        <div class="main-panel">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Введите город...">
                <button id="searchBtn">Поиск</button>
            </div>
            <div id="error" class="error" style="display: none;">Город не найден!</div>
            <div class="weather-info" id="weatherContent" style="display: none;">
                <h2 id="cityName">Город</h2>
                <p id="description">Описание</p>
                <div class="temp"><span id="tempValue">0</span>°C</div>
                <div class="details">
                    <div class="col"><p>Влажность</p><strong id="humidity">0%</strong></div>
                    <div class="col"><p>Ветер</p><strong id="windSpeed">0 м/с</strong></div>
                </div>
            </div>
        </div>

        <div id="forecastPanel" class="forecast-panel" style="display: none;">
            <h3>Прогноз на 5 дней</h3>
            <div id="forecastList" class="forecast-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
